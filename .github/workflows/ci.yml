name: ci

env:
  BAZEL_REMOTE_CACHE_URL: https://nearby-bezel-cache.variance.space/cache
  BAZEL_CACHE_TOKEN: ${{ secrets.BAZEL_CACHE_TOKEN }}

on:
  pull_request:
  push:
    branches: [dev, staging, main]

jobs:
  api:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nearby_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nearby_test
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          repository-cache: true
          disk-cache: true

      - name: Run migrations
        run: |
          for f in $(ls apps/api/internal/db/migrations/*.sql | sort -V); do
            psql "$DATABASE_URL" -f "$f"
          done

      - name: Gazelle API
        run: bazel run //apps/api:gazelle

      - name: Build API
        run: bazel build --config=ci --remote_cache="$BAZEL_REMOTE_CACHE_URL" --remote_header="Authorization=Bearer $BAZEL_CACHE_TOKEN" //apps/api/...

      - name: Test API
        run: bazel test --config=ci --remote_cache="$BAZEL_REMOTE_CACHE_URL" --remote_header="Authorization=Bearer $BAZEL_CACHE_TOKEN" //apps/api/...
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}

  apple:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          repository-cache: true
          disk-cache: true

      - name: Build packages
        run: bazel build --config=ci --remote_cache="$BAZEL_REMOTE_CACHE_URL" --remote_header="Authorization=Bearer $BAZEL_CACHE_TOKEN" //packages/...

      - name: Build iOS app
        run: |
          bazel build \
            --config=ci \
            --remote_cache="$BAZEL_REMOTE_CACHE_URL" \
            --remote_header="Authorization=Bearer $BAZEL_CACHE_TOKEN" \
            --apple_platform_type=ios \
            --ios_multi_cpus=sim_arm64 \
            //apps/ios:Nearby

      - name: Test packages
        run: bazel test --config=ci --remote_cache="$BAZEL_REMOTE_CACHE_URL" --remote_header="Authorization=Bearer $BAZEL_CACHE_TOKEN" //packages/...

  android:
    runs-on: ubuntu-latest
    env:
      SWIFT_VERSION: "6.3.0"
      SWIFT_ANDROID_SDK_VERSION: "6.3-RELEASE_android"
      ANDROID_NDK_VERSION: r29

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - uses: android-actions/setup-android@v4

      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.ANDROID_NDK_VERSION }}
          add-to-path: false
          local-cache: true

      - name: Cache Swiftly
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/swiftly
            ~/.cache/swiftly
            ~/.swiftly
          key: swiftly-${{ runner.os }}-${{ runner.arch }}-${{ env.SWIFT_VERSION }}

      - uses: vapor/swiftly-action@v0.2
        with:
          toolchain: ${{ env.SWIFT_VERSION }}

      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          repository-cache: true
          disk-cache: true

      - name: Export Android bridge environment
        run: |
          echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> "$GITHUB_ENV"
          echo "SWIFTLY_PATH=$(command -v swiftly)" >> "$GITHUB_ENV"
          swift_version_output="$(swiftly run swift --version)"
          echo "$swift_version_output"
          if ! grep -q "Swift version 6.3 " <<< "$swift_version_output"; then
            echo "Expected Swift 6.3.0-compatible toolchain for ${SWIFT_ANDROID_SDK_VERSION}"
            exit 1
          fi

      - name: Cache SwiftPM and Swift SDKs
        uses: actions/cache@v4
        with:
          path: |
            ~/.swiftpm
            ~/.config/swiftpm
            ~/.cache/org.swift.swiftpm
            ~/.cache/swiftpm
          key: swiftpm-${{ runner.os }}-${{ runner.arch }}-${{ env.SWIFT_VERSION }}-${{ env.SWIFT_ANDROID_SDK_VERSION }}

      - name: Install Swift Android SDK
        run: |
          swift_sdk_bundle="$(find "$HOME" -type d -name "swift-${SWIFT_ANDROID_SDK_VERSION}.artifactbundle" -print -quit)"

          if [ -z "$swift_sdk_bundle" ]; then
            swift sdk install \
              https://download.swift.org/swift-6.3-release/android-sdk/swift-6.3-RELEASE/swift-6.3-RELEASE_android.artifactbundle.tar.gz \
              --checksum 2f2942c4bcea7965a08665206212c66991dabe23725aeec7c4365fc91acad088

            swift_sdk_bundle="$(find "$HOME" -type d -name "swift-${SWIFT_ANDROID_SDK_VERSION}.artifactbundle" -print -quit)"
          fi

          if [ -z "$swift_sdk_bundle" ]; then
            echo "Swift Android SDK bundle not found under $HOME"
            exit 1
          fi

          echo "SWIFT_SDK_PATH=$(dirname "$swift_sdk_bundle")" >> "$GITHUB_ENV"

      - name: Cache Swift bridge build output
        uses: actions/cache@v4
        with:
          path: |
            packages/hello/.build
          key: swift-bridge-${{ runner.os }}-${{ runner.arch }}-${{ env.SWIFT_VERSION }}-${{ env.SWIFT_ANDROID_SDK_VERSION }}-arm64-v8a-${{ hashFiles('packages/hello/Package.swift', 'packages/hello/Package.resolved', 'packages/hello/Sources/**') }}

      - name: Build Android bridge + app
        run: bazel run --config=bridge_ci --remote_cache="$BAZEL_REMOTE_CACHE_URL" --remote_header="Authorization=Bearer $BAZEL_CACHE_TOKEN" //apps/android:app

      # !important: the app build is to expensive to run in the CI for now.
      # - name: Build Android app
      #   run: bazel build --config=ci --remote_cache="$BAZEL_REMOTE_CACHE_URL" --remote_header="Authorization=Bearer $BAZEL_CACHE_TOKEN" //apps/android:apk
